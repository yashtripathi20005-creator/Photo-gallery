<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo Gallery with Lightbox</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
    <div class="container">
        <h1>📸 Photo Gallery</h1>
        <div class="gallery">
            {% if images %}
                {% for img in images %}
                    <div class="gallery-item">
                        <a href="#" class="lightbox-trigger" data-image="{{ url_for('static', filename='uploads/' + img) }}">
                            <img src="{{ url_for('static', filename='uploads/' + img) }}" alt="{{ img }}" />
                        </a>
                    </div>
                {% endfor %}
            {% else %}
                <p class="no-images">No images found. Add some to <code>static/uploads/</code></p>
            {% endif %}
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <span class="close">&times;</span>
        <span class="prev">&#10094;</span>
        <span class="next">&#10095;</span>
        <img class="lightbox-image" id="lightbox-img" src="" alt="Lightbox" />
        <div class="caption" id="caption"></div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
